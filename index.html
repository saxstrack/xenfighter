<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xenocs Fighter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section id="character-select" class="screen active">
      <img src="assets/titletransparent.png" alt="Xenocs Fighter" class="title-logo" />
      <div class="select-row">
        <div class="select-col">
          <h3>Player 1</h3>
          <div class="carousel" id="p1-carousel">
            <button class="carousel-arrow left" data-dir="-1">&#9664;</button>
            <div class="carousel-display" id="p1-select"></div>
            <button class="carousel-arrow right" data-dir="1">&#9654;</button>
          </div>
        </div>
        <div class="select-col">
          <h3>Player 2</h3>
          <div class="carousel" id="p2-carousel">
            <button class="carousel-arrow left" data-dir="-1">&#9664;</button>
            <div class="carousel-display" id="p2-select"></div>
            <button class="carousel-arrow right" data-dir="1">&#9654;</button>
          </div>
        </div>
      </div>
      <button id="next-btn">Next</button>
    </section>

    <section id="stage-select" class="screen">
      <img src="assets/titletransparent.png" alt="Xenocs Fighter" class="title-logo" />
      <h3>Select Stage</h3>
      <div class="stage-row">
        <div class="stage-card selected" data-stage="0">
          <img src="assets/demolab.jpg" alt="Demo Lab" />
          <span>Demo Lab</span>
        </div>
        <div class="stage-card" data-stage="1">
          <img src="assets/unnamed.jpg" alt="Arcade Street" />
          <span>Arcade Street</span>
        </div>
      </div>
      <div class="stage-buttons">
        <button id="back-btn" class="secondary">Back</button>
        <button id="start-btn">Fight!</button>
      </div>
      <p class="hint">P1: A/D move, W jump, S block, F punch, G kick<br>P2: ←/→ move, ↑ jump, ↓ block, K punch, L kick</p>
    </section>

    <section id="fight-screen" class="screen">
      <div class="hud">
        <div class="bar-wrap">
          <div class="name" id="p1-name">P1 Rook</div>
          <div class="bar"><div id="p1-health" class="fill p1"></div></div>
        </div>
        <div id="timer">99</div>
        <div class="bar-wrap right">
          <div class="name" id="p2-name">P2 Rook</div>
          <div class="bar"><div id="p2-health" class="fill p2"></div></div>
        </div>
      </div>
      <canvas id="game" width="960" height="540"></canvas>
      <div id="result" class="result hidden"></div>
      <button id="rematch-btn" class="hidden">Rematch</button>
    </section>
  </div>
  <script src="character-loader.js?v=2"></script>
  <script src="game.js?v=2"></script>
</body>
</html>
